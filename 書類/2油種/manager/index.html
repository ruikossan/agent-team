<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: sans-serif;
      font-size: 14px;
    }

    h3 {
      margin-top: 20px;
    }

    /* ===== 基本情報 ===== */
    .form {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 10px 16px;
      max-width: 500px;
    }

    .form label {
      text-align: right;
      padding-top: 6px;
      font-weight: bold;
    }

    .form input {
      height: 34px;
      padding: 6px 10px;
      font-size: 14px;
      box-sizing: border-box;
    }

    /* ===== 明細 ===== */
    table {
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 6px;
      text-align: center;
    }

    table input, table select {
      width: 100%;
      height: 30px;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      padding: 8px 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h3>基本情報</h3>
<div class="form">
  <label>日付</label>
  <input type="date" id="date">

  <label>船名</label>
  <input id="ship">

  <label>船長名</label>
  <input id="captain">

  <label>桟橋名</label>
  <input id="pier">

  <label>バース</label>
  <input id="berth">

  <label>作業担当者</label>
  <input id="manager">
</div>

<h3>明細</h3>
<table border="1">
  <tr>
    <th>NO</th>
    <th>油種</th>
    <th>数量</th>
    <th>積み順</th>
    <th>使用ライン</th>
  </tr>

  <script>
    for (let i = 0; i < 6; i++) {
      document.write(`
        <tr>
          <td>${i + 1}</td>
          <td><input id="oil${i}"></td>
          <td><input type="number" id="qty${i}"></td>
          <td><input type="number" id="order${i}"></td>
          <td>
            <select id="line${i}">
              <option value=""></option>
              <option value="右">右</option>
              <option value="左">左</option>
            </select>
          </td>
        </tr>
      `);
    }
  </script>
</table>

<button onclick="submitData()">シート反映</button>

<script>
function submitData() {
  if (!date.value || !ship.value || !berth.value) {
    alert('日付・船名・バースは必須項目です');
    return;
  }

  const data = {
    date: date.value,
    ship: ship.value,
    captain: captain.value,
    pier: pier.value,
    berth: berth.value,
    manager: manager.value,
    details: [...Array(6)].map((_, i) => ({
      oil: document.getElementById('oil' + i).value,
      qty: document.getElementById('qty' + i).value,
      order: document.getElementById('order' + i).value,
      line: document.getElementById('line' + i).value
    }))
  };

  google.script.run
    .withSuccessHandler(() => google.script.host.close())
    .reflectSheet(data);
}
</script>

</body>
</html>
