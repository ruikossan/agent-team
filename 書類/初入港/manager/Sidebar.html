<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: sans-serif; font-size: 13px; margin: 0; padding: 12px; }
    .queue-item { border: 1px solid #d0d7de; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
    .queue-item h4 { margin: 0 0 6px; font-size: 14px; }
    .meta { color: #555; margin-bottom: 8px; }
    .actions { display: grid; gap: 6px; }
    .stamp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; align-items: center; }
    button, input { font-size: 13px; box-sizing: border-box; }
    button { padding: 8px 10px; }
    .status { margin-top: 12px; white-space: pre-wrap; color: #444; }
  </style>
</head>
<body>
  <button onclick="refresh()">再読込</button>
  <div id="queue"></div>
  <div id="status" class="status"></div>
  <script>
    const initialState = <?= initialState ?>;
    function setStatus(text){ status.textContent = text || ''; }
    function render(state){
      const records = state.queue || [];
      document.getElementById('queue').innerHTML = !records.length ? '<p>承認待ち案件はありません。</p>' : records.map((item)=>`<div class="queue-item"><h4>${item.caseId}</h4><div class="meta">${item.caseContent} / ${item.status}</div><div class="actions"><button onclick="loadCase('${item.caseId}')">シートへ読込</button><div class="stamp-row"><input id="staff-${item.caseId}" placeholder="主務職印名"><button onclick="approveStaff('${item.caseId}')">主務職承認</button></div><div class="stamp-row"><input id="chief-${item.caseId}" placeholder="課長印名"><button onclick="approveChief('${item.caseId}')">課長承認</button></div></div></div>`).join('');
    }
    function refresh(){ setStatus('更新しています...'); google.script.run.withSuccessHandler((state)=>{ render(state); setStatus(''); }).withFailureHandler((e)=>setStatus(e.message||String(e))).refreshSidebar(); }
    function loadCase(caseId){ setStatus('案件を読み込んでいます...'); google.script.run.withSuccessHandler((state)=>{ render(state); setStatus(caseId + ' を読み込みました。'); }).withFailureHandler((e)=>setStatus(e.message||String(e))).loadCase(caseId); }
    function approveStaff(caseId){ const stampName = document.getElementById('staff-' + caseId).value.trim(); if (!stampName) return setStatus('主務職印名を入力してください。'); setStatus('主務職承認を反映しています...'); google.script.run.withSuccessHandler((state)=>{ render(state); setStatus(caseId + ' を課長待ちへ更新しました。'); }).withFailureHandler((e)=>setStatus(e.message||String(e))).approveStaff(caseId, stampName); }
    function approveChief(caseId){ const stampName = document.getElementById('chief-' + caseId).value.trim(); if (!stampName) return setStatus('課長印名を入力してください。'); setStatus('課長承認と完了処理を反映しています...'); google.script.run.withSuccessHandler((state)=>{ render(state); setStatus(caseId + ' を確定済み・完了へ更新しました。'); }).withFailureHandler((e)=>setStatus(e.message||String(e))).approveChief(caseId, stampName); }
    render(initialState || { queue: [] });
  </script>
</body>
</html>
